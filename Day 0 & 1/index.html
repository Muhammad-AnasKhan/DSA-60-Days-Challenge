<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>

<body>
    <script>
        // assignment:

        // find a number between a range in an array:

        // for example:

        // problem: find the first index of number  4 in index range 1 and 3, if it does not exist return -1
        // array = { 0, 1, 2, 3, 3, 3, 4}
        // output should be - 1

        // problem: find the first index of number 4 in index range 1 and 3, if it does not exist return -1
        // array = { 0, 1, 4, 3, 3, 3, 4}
        // output should be 2
        // Bonus points: find all the index of the target number, (4) and return a list / array / vector

        function problemOne() {
            var array = [0, 1, 2, 3, 3, 3, 4]
            var count = 0
            var result
            for(var index=1; index<=3; index++){
                if(array[index] == 4){
                    result = "index of 4 is " + index
                    count++
                }
            }
            if(count==0){
                result = -1
            }
            
            return result
        }

        function problemTwo() {
            var array = [0, 1, 4, 3, 3, 3, 4]
            var count = 0
            var result
            var resultArray = []
            for (var index = 1; index < array.length; index++) {
                if (array[index] == 4) {
                    result =  "index of 4 is " + index
                    count++
                    resultArray.push(index)
                }
            }
            if(count==0){
                result = -1
            }

            // return array of indexes
            if(count>1){
                result = resultArray
            }

            return result
        }

        val_One = problemOne()
        val_two = problemTwo()
        document.write(val_One + "</br>")
        document.write(val_two)

        

    </script>
</body>

</html>
